name: Merge Back

on:
  workflow_call:
    inputs:
      base-branch:
        description: Branch to merge into
        type: string
        default: develop
      head-branch:
        description: Branch to merge from
        type: string
        default: main

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    concurrency:
      group: merge-back-${{ github.repository }}-${{ inputs.base-branch }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sync ${{ inputs.base-branch }} with ${{ inputs.head-branch }}
        run: |
          if git merge-base --is-ancestor "origin/${{ inputs.head-branch }}" "origin/${{ inputs.base-branch }}"; then
            echo "${{ inputs.base-branch }} already up to date with ${{ inputs.head-branch }}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout "${{ inputs.base-branch }}"
          git merge "origin/${{ inputs.head-branch }}" --no-ff \
            -m "chore: merge-back ${{ inputs.head-branch }} into ${{ inputs.base-branch }} [skip ci]"
          git push origin "${{ inputs.base-branch }}"
